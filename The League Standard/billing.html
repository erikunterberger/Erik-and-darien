<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Standard - Billing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="SignUp.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">League Standard</a>
      <div>
        <a class="nav-link text-white d-inline me-3" href="index.html">Home</a>
        <a class="nav-link text-white d-inline me-3" href="signup.html">Fan Sign-Up</a>
        <a class="nav-link text-white d-inline" href="players.html">Player Management</a>
      </div>
    </div>
  </nav>

  <header class="text-center py-5 bg-primary text-white">
    <h1 class="fw-bold">Billing Information</h1>
    <p class="lead">Complete your subscription below.</p>
  </header>

  <main class="container my-5">
    <h2 class="mb-4">Subscription Payment</h2>

    <form id="billingForm" class="row g-3">
      <div class="col-md-6">
        <label for="cardName" class="form-label">Name on Card *</label>
        <input type="text" class="form-control" id="cardName" required>
      </div>

      <div class="col-md-6">
        <label for="cardNumber" class="form-label">Card Number *</label>
        <input type="text" class="form-control" id="cardNumber" required>
      </div>

      <div class="col-md-6">
        <label for="billingAddress" class="form-label">Billing Address *</label>
        <input type="text" class="form-control" id="billingAddress" required>
      </div>

      <div class="col-md-3">
        <label for="expDate" class="form-label">Expiration Date *</label>
        <input type="month" class="form-control" id="expDate" required>
      </div>

      <div class="col-md-3">
        <label for="cvv" class="form-label">CVV *</label>
        <input type="text" class="form-control" id="cvv" required>
      </div>

      <div class="col-12">
        <button type="submit" class="btn btn-primary">Complete Subscription</button>
      </div>
    </form>

    <p id="message" class="mt-4 fw-bold text-success"></p>
  </main>

  <script src="billing.js"></script>
</body>
</html>
