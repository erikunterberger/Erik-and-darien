<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>League Standard – Delivery Preferences</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/SignUp.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">League Standard</a>

      <div class="ms-auto">
        <a class="nav-link text-white d-inline me-3" href="/">Homepage</a>
        <a class="nav-link text-white d-inline me-3" href="/html/SignUp.html">Signup</a>
        <a class="nav-link text-white d-inline" href="/html/manage-subscription.html">Manage Subscription</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card p-4">
          <h2 class="mb-3">Delivery Preferences</h2>
          <p class="text-muted">Choose how you would like to receive your League Standard magazine.</p>

          <form id="deliveryForm">
            <div class="mb-3">
              <label class="form-label d-block">Delivery Method</label>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="deliveryMethod" id="mailOption" value="mail">
                <label class="form-check-label" for="mailOption">Physical Mail</label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="deliveryMethod" id="gmailOption" value="gmail">
                <label class="form-check-label" for="gmailOption">Gmail Delivery</label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="deliveryMethod" id="downloadOption" value="download">
                <label class="form-check-label" for="downloadOption">Downloadable PDF</label>
              </div>
            </div>

            <div class="mb-3 d-none" id="mailAddressGroup">
              <label for="mailAddress" class="form-label">Mailing Address</label>
              <input type="text" class="form-control" id="mailAddress" placeholder="123 Main St, City, State">
            </div>

            <div class="mb-3 d-none" id="gmailAddressGroup">
              <label for="gmailAddress" class="form-label">Gmail Address</label>
              <input type="email" class="form-control" id="gmailAddress" placeholder="example@gmail.com">
            </div>

            <button class="btn btn-primary" type="submit">Save Preferences</button>
          </form>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card p-4 mb-3">
          <h5>Generated JSON</h5>
          <pre id="json-output" class="json-output"></pre>
        </div>

        <div class="card p-4">
          <h5>Submission Status</h5>
          <div id="submission-status" class="small text-muted">Waiting for submission…</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/finalization.js"></script>
</body>
</html>
