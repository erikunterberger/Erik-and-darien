<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your CSS -->
    <link rel="stylesheet" href="../css/players.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
    <a class="navbar-brand text-white fw-bold" href="#">League Standard</a>

    <div class="ms-auto">
        <a class="nav-link d-inline text-white" href="/">Home</a>
        <a class="nav-link d-inline text-white" href="signup.html">Sign Up</a>
        <a class="nav-link d-inline text-white active" href="#">Product Management</a>
        <a class="nav-link d-inline text-white" href="product-details.html">Product Details</a>
        <a class="nav-link d-inline text-white" href="shopping-cart.html">Shopping Cart</a>
        <a class="nav-link d-inline text-white" href="manage-subscription.html">Returns / Manage</a>
    </div>
</nav>

<!-- BLUE HEADER (MATCHES SIGNUP) -->
<div class="page-hero">
    <h1>Product Management</h1>
    <p>Manage magazine content and league updates.</p>
</div>

<!-- FORM SECTION -->
<div class="container page-section">

    <h2 class="mb-4">Add / Edit Product</h2>

    <div class="card p-4 shadow-sm">

        <form id="productForm">

            <div class="mb-3">
                <label class="form-label">Product Name *</label>
                <input id="productName" class="form-control" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Price *</label>
                    <input id="price" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Stock *</label>
                    <input id="stock" class="form-control" required>
                </div>
            </div>

            <div class="mb-3 mt-3">
                <label class="form-label">Category</label>
                <input id="category" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input id="image" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea id="description" class="form-control"></textarea>
            </div>

            <button type="submit" id="addProductBtn" class="btn btn-primary w-100">
                Save Product
            </button>

        </form>

    </div>

    <!-- TABLE -->
    <div class="mt-5">
        <h3>Products</h3>

        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Category</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="productTable"></tbody>
        </table>
    </div>

</div>

<!-- JS (DO NOT REMOVE OR IT BREAKS EVERYTHING) -->
<script src="../js/players.js"></script>

</body>
</html>
