<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Standard – Product Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/players.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">League Standard</a>
    <div>
      <a class="nav-link text-white d-inline me-3" href="/">Home</a>
      <a class="nav-link text-white d-inline me-3" href="/html/SignUp.html">Sign Up</a>
      <a class="nav-link text-white d-inline me-3" href="/html/players.html">Product Management</a>
      <a class="nav-link text-white d-inline me-3" href="/html/product-details.html">Product Details</a>
      <a class="nav-link text-white d-inline" href="/html/shopping-cart.html">Shopping Cart</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h1 class="mb-4 text-center">Product Management</h1>

  <form id="productForm" class="card p-4 shadow">
    <input type="hidden" id="productId">

    <div class="mb-3">
      <label class="form-label">Product Name *</label>
      <input type="text" id="productName" class="form-control" required>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Price *</label>
        <input type="number" id="productPrice" class="form-control" step="0.01" min="0" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Stock *</label>
        <input type="number" id="productStock" class="form-control" min="0" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Category</label>
      <input type="text" id="productCategory" class="form-control" value="Magazine">
    </div>

    <div class="mb-3">
      <label class="form-label">Image URL</label>
      <input type="text" id="productImageUrl" class="form-control" placeholder="https://example.com/image.jpg">
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea id="productDescription" class="form-control" rows="4"></textarea>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary w-100" id="submitBtn">Add Product</button>
      <button type="button" class="btn btn-secondary w-100" id="cancelEditBtn">Cancel Edit</button>
    </div>
  </form>

  <div class="mt-4">
    <input type="text" id="searchInput" class="form-control" placeholder="Search products by name, category, or description...">
  </div>

  <div class="mt-3">
    <select id="sortSelect" class="form-select">
      <option value="">Sort Products</option>
      <option value="name">Sort by Name</option>
      <option value="priceLow">Sort by Price: Low to High</option>
      <option value="priceHigh">Sort by Price: High to Low</option>
    </select>
  </div>

  <table class="table table-striped mt-4" id="productTable">
    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Price</th>
        <th>Category</th>
        <th>Stock</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h4 class="mt-4">JSON Data</h4>
  <pre id="jsonOutput"></pre>
</div>

<script src="/js/players.js"></script>
</body>
</html>
