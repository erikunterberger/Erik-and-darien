<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Standard – Player Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/players.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">League Standard</a>
    <div>
      <a class="nav-link text-white d-inline me-3" href="/html/SignUp.html">Fan Signup</a>
      <a class="nav-link text-white d-inline" href="/html/players.html">Player Management</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h1 class="mb-4 text-center">Player Management</h1>

  <form id="playerForm" class="card p-4 shadow">
    <div class="mb-3">
      <label class="form-label">Player ID (Auto-Generated)</label>
      <input type="text" id="playerId" class="form-control" readonly>
    </div>

    <div class="row mb-3">
      <div class="col">
        <label class="form-label">Player Name *</label>
        <input type="text" id="playerName" class="form-control" required>
      </div>

      <div class="col">
        <label class="form-label">Team *</label>
        <select id="playerTeam" class="form-select" required>
          <option value="">Select Team</option>
          <option>Atlanta Hawks</option>
          <option>Boston Celtics</option>
          <option>Brooklyn Nets</option>
          <option>Charlotte Hornets</option>
          <option>Chicago Bulls</option>
          <option>Cleveland Cavaliers</option>
          <option>Dallas Mavericks</option>
          <option>Denver Nuggets</option>
          <option>Detroit Pistons</option>
          <option>Golden State Warriors</option>
          <option>Houston Rockets</option>
          <option>Indiana Pacers</option>
          <option>LA Clippers</option>
          <option>Los Angeles Lakers</option>
          <option>Memphis Grizzlies</option>
          <option>Miami Heat</option>
          <option>Milwaukee Bucks</option>
          <option>Minnesota Timberwolves</option>
          <option>New Orleans Pelicans</option>
          <option>New York Knicks</option>
          <option>Oklahoma City Thunder</option>
          <option>Orlando Magic</option>
          <option>Philadelphia 76ers</option>
          <option>Phoenix Suns</option>
          <option>Portland Trail Blazers</option>
          <option>Sacramento Kings</option>
          <option>San Antonio Spurs</option>
          <option>Toronto Raptors</option>
          <option>Utah Jazz</option>
          <option>Washington Wizards</option>
        </select>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col">
        <label class="form-label">Position *</label>
        <select id="playerPosition" class="form-select" required>
          <option value="">Select Position</option>
          <option>Point Guard</option>
          <option>Shooting Guard</option>
          <option>Small Forward</option>
          <option>Power Forward</option>
          <option>Center</option>
        </select>
      </div>

      <div class="col">
        <label class="form-label">Years in NBA *</label>
        <input type="number" id="playerYears" class="form-control" required>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col">
        <label class="form-label">Height (Feet) *</label>
        <input type="number" id="playerHeightFeet" class="form-control" required>
      </div>
      <div class="col">
        <label class="form-label">Height (Inches) *</label>
        <input type="number" id="playerHeightInches" class="form-control" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Weight (lbs) *</label>
      <input type="number" id="playerWeight" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">College (Optional)</label>
      <input type="text" id="playerCollege" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Player Photo (Optional)</label>
      <input type="file" id="playerPhoto" class="form-control" accept="image/*">
    </div>

    <div class="mb-3">
      <label class="form-label">Player Value (Rating) *</label>
      <input type="number" id="playerValue" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Add / Update Player</button>
  </form>

  <div class="mt-4">
    <input type="text" id="searchInput" class="form-control" placeholder="Search players by name, team, or position...">
  </div>

  <div class="mt-3">
    <select id="sortSelect" class="form-select">
      <option value="">Sort Players</option>
      <option value="name">Sort by Name</option>
      <option value="team">Sort by Team</option>
      <option value="value">Sort by Rating</option>
    </select>
  </div>

  <table class="table table-striped mt-4" id="playerTable">
    <thead class="table-dark">
      <tr>
        <th></th>
        <th>ID</th>
        <th>Name</th>
        <th>Team</th>
        <th>Position</th>
        <th>Height</th>
        <th>Weight</th>
        <th>Years Played</th>
        <th>College</th>
        <th>Rating</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h4 class="mt-4">JSON Data</h4>
  <pre id="jsonOutput"></pre>
</div>

<script src="/js/players.js"></script>
</body>
</html>
