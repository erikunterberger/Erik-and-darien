<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Standard - Returns</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">League Standard</a>
    <div>
      <a class="nav-link text-white d-inline me-3" href="/">Home</a>
      <a class="nav-link text-white d-inline me-3" href="/html/shopping-cart.html">Shopping Cart</a>
      <a class="nav-link text-white d-inline" href="/html/manage-subscription.html">Manage Subscription</a>
    </div>
  </div>
</nav>

<div class="container my-5">
  <h1 class="mb-4">Returns</h1>

  <div class="card p-4 mb-4">
    <h4>Submit Return Request</h4>
    <form id="returnsForm">
      <div class="mb-3">
        <label class="form-label">Cart ID *</label>
        <input type="text" id="cartId" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Reason *</label>
        <textarea id="reason" class="form-control" rows="3" required></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Submit Return</button>
    </form>
    <p id="returnMessage" class="mt-3 fw-bold"></p>
  </div>

  <div class="card p-4">
    <h4>Return Records</h4>
    <table class="table table-striped" id="returnsTable">
      <thead>
        <tr>
          <th>Cart ID</th>
          <th>Reason</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h5 class="mt-3">JSON Preview</h5>
    <pre id="returnsJson"></pre>
  </div>
</div>

<script src="/js/returns.js"></script>
</body>
</html>
