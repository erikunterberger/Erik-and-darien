<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>League Standard – Delivery Preferences</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <!-- NAVBAR (ONLY homepage, signup, products) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">League Standard</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="index.html">Homepage</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="signup.html">Signup</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="products.html">Products</a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="container py-5">
    <div class="row g-4">

      <!-- FORM -->
      <div class="col-lg-7">
        <div class="card p-4">
          <h2 class="mb-3">Delivery Preferences</h2>
          <p class="text-muted">Choose how you would like to receive your League Standard magazine.</p>

          <div id="finalization-root"></div>
        </div>
      </div>

      <!-- JSON + STATUS -->
      <div class="col-lg-5">
        <div class="card p-4 mb-3">
          <h5>Generated JSON</h5>
          <pre id="json-output" class="json-output"></pre>
        </div>

        <div class="card p-4">
          <h5>Submission Status</h5>
          <div id="submission-status" class="small text-muted">Waiting for submission…</div>
        </div>
      </div>

    </div>
  </div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Custom JS -->
  <script type="text/babel" src="js/finalization.js"></script>

</body>
</html>
